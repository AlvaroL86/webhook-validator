<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Business Manager</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        #root {
            max-width: 1400px;
            margin: 0 auto;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .header-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
            background: #f8f9fa;
        }

        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 15px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
            position: relative;
        }

        .tab:hover {
            background: #f0f0f0;
        }

        .tab.active {
            color: #667eea;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: #667eea;
        }

        .tab-content {
            padding: 30px;
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            word-break: break-all;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .status-badge.live {
            background: #d4edda;
            color: #155724;
        }

        .status-badge.pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-badge.rejected {
            background: #f8d7da;
            color: #721c24;
        }

        .message-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .message-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .message-from {
            font-weight: 600;
            color: #333;
        }

        .message-time {
            font-size: 12px;
            color: #999;
        }

        .message-text {
            color: #666;
            line-height: 1.5;
            margin: 10px 0;
        }

        .template-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .template-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .template-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .template-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .template-status {
            margin-bottom: 15px;
        }

        .template-body {
            background: white;
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
            max-height: 100px;
            overflow-y: auto;
            border-left: 3px solid #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            font-size: 12px;
            padding: 8px 12px;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Configuración
        const CONFIG = {
            API_BASE: 'https://graph.instagram.com/v18.0',
            PHONE_NUMBER_ID: '111014585224427',
            WABA_ID: '105695539097204',
            ACCESS_TOKEN: 'EAARm8LRk4zEBRCFkmFRcF0zHNYUNrTZCG5RrJmRkO0socidmdT3vIXgidvPKgrYqxKaZAdWC6UxagI4OIAs7ZA3cZBN6obN6K4FvMmquKafLgwAdOQXZBuPOglukFtD3JGFZB6EUFyNYkMsZANcQoDFTOGZAwr9RAdB2ZCSssEZCVHywk6FZCbDhM9OinRTZAUVe2AZDZD'
        };

        // Componente Principal
        function App() {
            const [activeTab, setActiveTab] = useState('conversations');
            const [accountInfo, setAccountInfo] = useState(null);
            const [templates, setTemplates] = useState([]);
            const [messages, setMessages] = useState([]);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                fetchAccountInfo();
                fetchTemplates();
                fetchMessages();
            }, []);

            const fetchAccountInfo = async () => {
                try {
                    setLoading(true);
                    const response = await fetch(
                        `${CONFIG.API_BASE}/${CONFIG.PHONE_NUMBER_ID}?fields=display_phone_number,phone_number_id,quality_rating,messaging_product&access_token=${CONFIG.ACCESS_TOKEN}`
                    );
                    const data = await response.json();
                    setAccountInfo(data);
                } catch (error) {
                    console.error('Error fetching account info:', error);
                }
                setLoading(false);
            };

            const fetchTemplates = async () => {
                try {
                    setLoading(true);
                    const response = await fetch(
                        `${CONFIG.API_BASE}/${CONFIG.WABA_ID}/message_templates?access_token=${CONFIG.ACCESS_TOKEN}`
                    );
                    const data = await response.json();
                    setTemplates(data.data || []);
                } catch (error) {
                    console.error('Error fetching templates:', error);
                }
                setLoading(false);
            };

            const fetchMessages = async () => {
                try {
                    // Simulación: en producción esto vendría de tu BD
                    setMessages([
                        {
                            id: 1,
                            from: 'Juan García',
                            number: '+34 912 345 678',
                            message: 'Hola, ¿puedo hacer un pedido?',
                            timestamp: new Date().toLocaleString()
                        },
                        {
                            id: 2,
                            from: 'María López',
                            number: '+34 923 456 789',
                            message: '¿Cuáles son vuestros horarios?',
                            timestamp: new Date().toLocaleString()
                        }
                    ]);
                } catch (error) {
                    console.error('Error fetching messages:', error);
                }
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>📱 WhatsApp Business Manager</h1>
                        <div className="header-badge">
                            Status: <strong>Conectado</strong>
                        </div>
                    </div>

                    <div className="tabs">
                        <button
                            className={`tab ${activeTab === 'conversations' ? 'active' : ''}`}
                            onClick={() => setActiveTab('conversations')}
                        >
                            💬 Conversaciones
                        </button>
                        <button
                            className={`tab ${activeTab === 'templates' ? 'active' : ''}`}
                            onClick={() => setActiveTab('templates')}
                        >
                            📋 Templates
                        </button>
                        <button
                            className={`tab ${activeTab === 'account' ? 'active' : ''}`}
                            onClick={() => setActiveTab('account')}
                        >
                            ⚙️ Cuenta
                        </button>
                    </div>

                    {/* TAB: Conversaciones */}
                    <div className={`tab-content ${activeTab === 'conversations' ? 'active' : ''}`}>
                        <h2 style={{ marginBottom: '20px' }}>Conversaciones Recientes</h2>
                        {messages.length > 0 ? (
                            <div className="message-list">
                                {messages.map(msg => (
                                    <div key={msg.id} className="message-item">
                                        <div className="message-header">
                                            <div className="message-from">{msg.from}</div>
                                            <div className="message-time">{msg.timestamp}</div>
                                        </div>
                                        <div style={{ fontSize: '12px', color: '#999', marginBottom: '8px' }}>
                                            {msg.number}
                                        </div>
                                        <div className="message-text">{msg.message}</div>
                                        <div className="button-group">
                                            <button className="btn-primary">Responder</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="empty-state">
                                <h3>Sin conversaciones</h3>
                                <p>Los mensajes aparecerán aquí cuando recibas</p>
                            </div>
                        )}
                    </div>

                    {/* TAB: Templates */}
                    <div className={`tab-content ${activeTab === 'templates' ? 'active' : ''}`}>
                        <div style={{ marginBottom: '20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <h2>Plantillas de Mensaje</h2>
                            <button className="btn-primary">+ Nueva Template</button>
                        </div>

                        {loading ? (
                            <div className="loading">
                                <div className="spinner"></div>
                                <p>Cargando templates...</p>
                            </div>
                        ) : templates.length > 0 ? (
                            <div className="template-list">
                                {templates.map(template => (
                                    <div key={template.id} className="template-card">
                                        <div className="template-name">{template.name}</div>
                                        <div className="template-status">
                                            <span className={`status-badge ${template.status === 'APPROVED' ? 'live' : template.status === 'PENDING' ? 'pending' : 'rejected'}`}>
                                                {template.status === 'APPROVED' ? '✓ Aprobada' : 
                                                 template.status === 'PENDING' ? '⏳ Pendiente' : '✗ Rechazada'}
                                            </span>
                                        </div>
                                        <div className="template-body">
                                            {template.components?.[0]?.text?.body || 'Sin contenido'}
                                        </div>
                                        <div className="button-group">
                                            <button className="btn-primary" style={{ flex: 1 }}>Editar</button>
                                            <button className="btn-danger">Eliminar</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="empty-state">
                                <h3>Sin templates</h3>
                                <p>Crea tu primera plantilla de mensaje</p>
                            </div>
                        )}
                    </div>

                    {/* TAB: Cuenta */}
                    <div className={`tab-content ${activeTab === 'account' ? 'active' : ''}`}>
                        <h2 style={{ marginBottom: '20px' }}>Información de Cuenta</h2>

                        <div className="info-grid">
                            <div className="info-card">
                                <div className="info-label">Número de Teléfono</div>
                                <div className="info-value">+34 976 04 30 30</div>
                            </div>

                            <div className="info-card">
                                <div className="info-label">Phone Number ID</div>
                                <div className="info-value">111014585224427</div>
                            </div>

                            <div className="info-card">
                                <div className="info-label">WABA ID</div>
                                <div className="info-value">105695539097204</div>
                            </div>

                            <div className="info-card">
                                <div className="info-label">Nombre Mostrado</div>
                                <div className="info-value">Fidelity For Net</div>
                            </div>

                            <div className="info-card">
                                <div className="info-label">Calidad</div>
                                <div className="info-value">
                                    Buena
                                    <span className="status-badge live">✓ High</span>
                                </div>
                            </div>

                            <div className="info-card">
                                <div className="info-label">Modo de Cuenta</div>
                                <div className="info-value">
                                    En Producción
                                    <span className="status-badge live">LIVE</span>
                                </div>
                            </div>

                            <div className="info-card">
                                <div className="info-label">Límite de Mensajes</div>
                                <div className="info-value">10K Clientes / 24h</div>
                            </div>

                            <div className="info-card">
                                <div className="info-label">Producto de Mensajería</div>
                                <div className="info-value">WhatsApp</div>
                            </div>
                        </div>

                        <h3 style={{ marginTop: '30px', marginBottom: '15px' }}>Estadísticas</h3>
                        <div className="info-grid">
                            <div className="info-card">
                                <div className="info-label">Mensajes Recibidos</div>
                                <div className="info-value" style={{ color: '#667eea' }}>
                                    {messages.length}
                                </div>
                            </div>

                            <div className="info-card">
                                <div className="info-label">Plantillas Creadas</div>
                                <div className="info-value" style={{ color: '#667eea' }}>
                                    {templates.length}
                                </div>
                            </div>

                            <div className="info-card">
                                <div className="info-label">Última Actividad</div>
                                <div className="info-value">Hace 5 min</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
